<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian CSS Grid</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 64px;
      padding: 48px 24px;
      font-family: 'Courier New', monospace;
    }

    .label {
      font-size: 11px;
      letter-spacing: 4px;
      color: #555;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 14px;
    }

    /*
      DESKTOP GRID
      Columns: 150px | 8px | 100px | 6px | 180px | 8px | 1fr
      Rows:     60px | 8px | 140px | 6px | 100px | 8px | 1fr
      Rule: every black line (col/row) spans the FULL dimension — no floating ends.
      Rule: red / yellow / blue are always separated by a black line column or row.
    */
    .mondrian-desktop {
      width: 600px;
      height: 420px;
      display: grid;
      grid-template-columns: 150px 8px 100px 6px 180px 8px 1fr;
      grid-template-rows:     60px  8px 140px 6px 100px 8px 1fr;
      background: #111;
      outline: 8px solid #111;
    }

    /*
      MOBILE GRID
      Fewer cols & rows, different proportions from desktop.
      Columns: 130px | 8px | 1fr | 6px | 90px
      Rows:    120px | 8px | 100px | 6px | 80px | 8px | 1fr
    */
    .mondrian-mobile {
      width: 320px;
      height: 460px;
      display: grid;
      grid-template-columns: 130px 8px 1fr 6px 90px;
      grid-template-rows:    120px 8px 100px 6px 80px 8px 1fr;
      background: #111;
      outline: 8px solid #111;
    }

    .k  { background: #111; }        /* black line */
    .w  { background: #ffffff; }     /* white */
    .g  { background: #909090; }     /* gray */
    .r  { background: #D52B2A; }     /* red */
    .y  { background: #F0C300; }     /* yellow */
    .b  { background: #1A3D9E; }     /* blue */

    /* mobile custom palette — same structure rules, different hues */
    .m-r { background: #B94B2C; }
    .m-y { background: #C8950A; }
    .m-b { background: #1B3D7A; }
    .m-g { background: #7A7A7A; }
    .m-w { background: #ffffff; }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════
       DESKTOP
       Color layout (col × row):
       Every black line runs full width/height.
       Primary colors separated by black lines.

       Grid positions (col / row):
       col1=1, line=2, col2=3, line=4, col3=5, line=6, col4=7
       row1=1, line=2, row2=3, line=4, row3=5, line=6, row4=7
  ═══════════════════════════════ -->
  <div>
    <div class="label">A — Desktop · Primary Colors</div>
    <div class="mondrian-desktop">

      <!-- FULL-SPAN VERTICAL BLACK LINES (run all 7 rows) -->
      <div style="grid-column:2; grid-row:1/8" class="k"></div>
      <div style="grid-column:4; grid-row:1/8" class="k"></div>
      <div style="grid-column:6; grid-row:1/8" class="k"></div>

      <!-- FULL-SPAN HORIZONTAL BLACK LINES (run all 7 cols) -->
      <div style="grid-column:1/8; grid-row:2" class="k"></div>
      <div style="grid-column:1/8; grid-row:4" class="k"></div>
      <div style="grid-column:1/8; grid-row:6" class="k"></div>

      <!--
        COLOR CELLS
        Adjacency check — each primary color cell's neighbors:

        RED   → col1,row3 → neighbors: above=WHITE(1,1), below=GRAY(1,5), right=BLACK LINE
        YELLOW→ col3,row1 → neighbors: left=BLACK LINE, right=BLACK LINE, below=BLACK LINE → safe
        BLUE  → col5,row5 → neighbors: above=BLACK LINE, left=BLACK LINE, right=BLACK LINE, below=WHITE → safe
        YELLOW→ col7,row3 → neighbors: left=BLACK LINE → safe
        RED   → col5,row7 → neighbors: above=BLACK LINE, left=BLACK LINE → safe
        BLUE  → col1,row7 → neighbors: above=GRAY, right=BLACK LINE → safe
      -->

      <!-- ROW 1 -->
      <div style="grid-column:1; grid-row:1" class="w"></div>   <!-- white -->
      <div style="grid-column:3; grid-row:1" class="y"></div>   <!-- YELLOW -->
      <div style="grid-column:5; grid-row:1" class="w"></div>   <!-- white -->
      <div style="grid-column:7; grid-row:1" class="w"></div>   <!-- white -->

      <!-- ROW 3 -->
      <div style="grid-column:1; grid-row:3" class="r"></div>   <!-- RED -->
      <div style="grid-column:3; grid-row:3" class="w"></div>   <!-- white -->
      <div style="grid-column:5; grid-row:3" class="g"></div>   <!-- gray -->
      <div style="grid-column:7; grid-row:3" class="y"></div>   <!-- YELLOW — separated from top-yellow by black line row2 -->

      <!-- ROW 5 -->
      <div style="grid-column:1; grid-row:5" class="g"></div>   <!-- gray -->
      <div style="grid-column:3; grid-row:5" class="w"></div>   <!-- white -->
      <div style="grid-column:5; grid-row:5" class="b"></div>   <!-- BLUE -->
      <div style="grid-column:7; grid-row:5" class="w"></div>   <!-- white -->

      <!-- ROW 7 -->
      <div style="grid-column:1; grid-row:7" class="b"></div>   <!-- BLUE — separated from blue(5,5) by black line col6 and row6 -->
      <div style="grid-column:3; grid-row:7" class="y"></div>   <!-- YELLOW — separated from others by black lines -->
      <div style="grid-column:5; grid-row:7" class="r"></div>   <!-- RED — separated from red(1,3) by black lines -->
      <div style="grid-column:7; grid-row:7" class="w"></div>   <!-- white -->

    </div>
  </div>


  <!-- ═══════════════════════════════
       MOBILE
       Fewer rows & cols than desktop.
       Custom warm palette — same rules apply.
       col1=1, line=2, col2=3, line=4, col3=5
       row1=1, line=2, row2=3, line=4, row3=5, line=6, row4=7
  ═══════════════════════════════ -->
  <div>
    <div class="label">B — Mobile · Custom Palette</div>
    <div class="mondrian-mobile">

      <!-- FULL-SPAN VERTICAL BLACK LINES -->
      <div style="grid-column:2; grid-row:1/8" class="k"></div>
      <div style="grid-column:4; grid-row:1/8" class="k"></div>

      <!-- FULL-SPAN HORIZONTAL BLACK LINES -->
      <div style="grid-column:1/6; grid-row:2" class="k"></div>
      <div style="grid-column:1/6; grid-row:4" class="k"></div>
      <div style="grid-column:1/6; grid-row:6" class="k"></div>

      <!--
        Adjacency check:
        m-r(1,1) → right=BLACK, below=BLACK → safe
        m-y(3,1) → left=BLACK, right=BLACK  → safe
        m-b(5,1) → left=BLACK, below=BLACK  → safe
        m-y(1,3) → above=BLACK, right=BLACK, below=BLACK → safe
        m-g(3,3) → all sides: BLACK lines   → safe
        m-r(5,5) → above=BLACK, left=BLACK  → safe
        m-b(1,7) → above=BLACK, right=BLACK → safe
        m-y(5,3) → left=BLACK, above=BLACK, below=BLACK → safe
      -->

      <!-- ROW 1 -->
      <div style="grid-column:1; grid-row:1" class="m-r"></div>  <!-- rust -->
      <div style="grid-column:3; grid-row:1" class="m-w"></div>  <!-- white -->
      <div style="grid-column:5; grid-row:1" class="m-b"></div>  <!-- navy -->

      <!-- ROW 3 -->
      <div style="grid-column:1; grid-row:3" class="m-y"></div>  <!-- gold -->
      <div style="grid-column:3; grid-row:3" class="m-g"></div>  <!-- gray -->
      <div style="grid-column:5; grid-row:3" class="m-y"></div>  <!-- gold — separated from navy by black line row2 -->

      <!-- ROW 5 -->
      <div style="grid-column:1; grid-row:5" class="m-w"></div>  <!-- white -->
      <div style="grid-column:3; grid-row:5" class="m-r"></div>  <!-- rust — separated from top rust by black lines -->
      <div style="grid-column:5; grid-row:5" class="m-w"></div>  <!-- white -->

      <!-- ROW 7 -->
      <div style="grid-column:1; grid-row:7" class="m-b"></div>  <!-- navy — separated from top navy by black lines -->
      <div style="grid-column:3; grid-row:7" class="m-w"></div>  <!-- white -->
      <div style="grid-column:5; grid-row:7" class="m-r"></div>  <!-- rust -->

    </div>
  </div>

</body>
</html>
