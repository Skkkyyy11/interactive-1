<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>Low Poly 静物 CSS</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .scene {
            position: relative;
            width: 900px;
            height: 500px;
            background: #eaeaea;
            overflow: hidden;
        }

        .whiteboard {
            position: absolute;
            top: 40px;
            left: 250px;
            width: 400px;
            height: 220px;
            background: #f9f9f9;
            border: 6px solid #222;
            z-index: 1;
        }

        .back-table {
            position: absolute;
            top: 260px;
            left: 120px;
            width: 260px;
            height: 20px;
            background: #ffffff;
            z-index: 2;
        }

        .chair-back {
            position: absolute;
            top: 220px;
            right: 140px;
            width: 120px;
            height: 140px;
            z-index: 2;
            transform: translateX(-100%);
        }
        .chair-back-main {
            position: absolute;
            inset: 0;
            background: #222222; 
            clip-path: polygon(
                15% 0, 85% 0, 
                100% 15%, 100% 85%,
                90% 100%, 10% 100%,
                0 85%, 0 15%
            );
            z-index: 1;
        }
        .chair-back-inner {
            position: absolute;
            inset: 8px;
            background: #1a1a1a;
            clip-path: polygon(
                15% 0, 85% 0,
                100% 15%, 100% 85%,
                90% 100%, 10% 100%,
                0 85%, 0 15%
            );
            z-index: 2;
        }
        .chair-back-stripe1 {
            position: absolute;
            top: 30%;
            left: 15%;
            right: 15%;
            height: 6px;
            background: #2a2a2a;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
            z-index: 3;
        }
        .chair-back-stripe2 {
            position: absolute;
            top: 50%;
            left: 10%;
            right: 10%;
            height: 6px;
            background: #2a2a2a;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
            z-index: 3;
        }
        .chair-back-stripe3 {
            position: absolute;
            top: 70%;
            left: 15%;
            right: 15%;
            height: 6px;
            background: #2a2a2a;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
            z-index: 3;
        }
        .chair-back-highlight {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 20px;
            bottom: 20px;
            background: #333333;
            opacity: 0.7;
            clip-path: polygon(
                20% 0, 80% 5%,
                90% 20%, 90% 70%,
                80% 90%, 50% 95%,
                20% 90%, 10% 70%,
                10% 20%
            );
            z-index: 2;
        }

        .front-table {
            position: absolute;
            bottom: 60px;
            left: 80px;
            width: 740px;
            height: 80px;
            background: #ffffff;
            clip-path: polygon(
                0 0, 100% 10%,
                96% 100%, 4% 90%
            );
            z-index: 3;
        }
        .apple {
            position: absolute;
            bottom: 130px;
            left: 210px;
            width: 70px;
            height: 70px;
            z-index: 4;
            filter: drop-shadow(2px 3px 2px rgba(0,0,0,0.2));
        }
        .apple-body {
            position: absolute;
            inset: 0;
            background: #d94c3a;
            clip-path: polygon(
                50% 8%, 
                78% 5%, 
                96% 28%, 
                96% 58%, 
                82% 88%, 
                50% 100%,
                18% 88%, 
                4% 58%,  
                4% 28%,  
                22% 5%   
            );
        }
        .apple-stem {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 12px;
            background: #6b4226;
            clip-path: polygon(
                30% 0, 70% 0,
                80% 100%, 20% 100%
            );
            z-index: 5;
        }
        .apple-highlight {
            position: absolute;
            inset: 10px 5px 20px 25px;
            background: #e66553;
            clip-path: polygon(
                50% 0, 90% 20%,
                70% 70%, 30% 50%
            );
            opacity: 0.7;
            z-index: 4;
        }
        .pineapple {
            position: absolute;
            bottom: 120px;
            left: 310px;
            width: 100px; /* 加宽一点，比例更协调，不显得单薄 */
            height: 160px; /* 略加高，增强立体感 */
            z-index: 4;
            filter: drop-shadow(2px 3px 2px rgba(0,0,0,0.2));
        }
        .pineapple-body {
            position: absolute;
            inset: 0;
            background: #d6b24c;
            clip-path: polygon(38% 0, 62% 0, 98% 40%, 95% 88%, 75% 100%, 25% 100%, 5% 88%, 2% 40%);
            z-index: 1;
        }
        .pineapple-scale1 {
            position: absolute;
            inset: 10px;
            background: #cfa73f;
            clip-path: polygon(
                42% 8%, 58% 8%,
                88% 30%, 85% 55%,
                70% 80%, 50% 95%,
                30% 80%, 15% 55%,
                12% 30%
            );
            z-index: 2;
        }
        .pineapple-scale2 {
            position: absolute;
            inset: 20px 18px;
            background: #b8942e;
            clip-path: polygon(
                46% 12%, 54% 12%,
                78% 35%, 75% 60%,
                60% 85%, 50% 92%,
                40% 85%, 25% 60%,
                22% 35%
            );
            z-index: 3;
        }
        .pineapple-scale3 {
            position: absolute;
            inset: 30px 25px;
            background: #e0c05a;
            clip-path: polygon(
                48% 15%, 52% 15%,
                70% 40%, 68% 65%,
                55% 88%, 50% 90%,
                45% 88%, 32% 65%,
                30% 40%
            );
            z-index: 4;
        }
        .pineapple-leaves {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 40px;
            z-index: 5;
        }
        .leaf1 {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 40px;
            background: #4a7c59;
            clip-path: polygon(50% 0, 100% 60%, 70% 100%, 30% 100%, 0 60%);
        }
        .leaf2 {
            position: absolute;
            top: 8px;
            left: 15%;
            transform: translateX(-50%) rotate(-30deg);
            width: 20px;
            height: 35px;
            background: #5a8c69;
            clip-path: polygon(50% 0, 100% 60%, 70% 100%, 30% 100%, 0 60%);
        }
        .leaf3 {
            position: absolute;
            top: 8px;
            right: 15%;
            transform: translateX(50%) rotate(30deg);
            width: 20px;
            height: 35px;
            background: #5a8c69;
            clip-path: polygon(50% 0, 100% 60%, 70% 100%, 30% 100%, 0 60%);
        }
        .leaf4 {
            position: absolute;
            top: 15px;
            left: 30%;
            transform: translateX(-50%) rotate(-15deg);
            width: 18px;
            height: 30px;
            background: #6a9c79;
            clip-path: polygon(50% 0, 100% 60%, 70% 100%, 30% 100%, 0 60%);
        }
        .leaf5 {
            position: absolute;
            top: 15px;
            right: 30%;
            transform: translateX(50%) rotate(15deg);
            width: 18px;
            height: 30px;
            background: #6a9c79;
            clip-path: polygon(50% 0, 100% 60%, 70% 100%, 30% 100%, 0 60%);
        }
        .vase {
            position: absolute;
            bottom: 120px;
            left: 390px;
            width: 70px;
            height: 140px;
            z-index: 5;
            filter: drop-shadow(2px 3px 2px rgba(0,0,0,0.2));
        }

        .v1 {
            position: absolute;
            inset: 0;
            background: #8fc3b1;
            clip-path: polygon(
                40% 0, 60% 0,
                80% 20%, 90% 50%,
                85% 80%, 70% 100%,
                30% 100%, 15% 80%,
                10% 50%, 20% 20%
            );
        }

        .v2 {
            position: absolute;
            inset: 10px 12px 15px;
            background: #7ab1a1;
            clip-path: polygon(
                40% 0, 60% 0,
                75% 20%, 85% 50%,
                80% 80%, 65% 100%,
                35% 100%, 20% 80%,
                15% 50%, 25% 20%
            );
        }

        .flowers {
            position: absolute;
            bottom: 260px;
            left: 360px;
            width: 120px;
            height: 120px;
            z-index: 5;
        }
        .flower {
            position: absolute;
            width: 60px;
            height: 60px;
            transform-origin: center bottom;
        }
        .flower-petal {
            position: absolute;
            inset: 0;
            background: #ffd300;
            clip-path: polygon(
                50% 0%,
                68% 25%,
                100% 35%,
                78% 60%,
                82% 90%,
                50% 80%,
                18% 90%,
                22% 60%,
                0% 35%,
                32% 25%
            );
            z-index: 1;
        }
        .flower-highlight {
            position: absolute;
            inset: 5px 8px 15px 5px;
            background: #fff380;
            clip-path: polygon(
                50% 0%,
                65% 28%,
                90% 38%,
                75% 62%,
                78% 85%,
                50% 75%,
                22% 85%,
                25% 62%,
                10% 38%,
                35% 28%
            );
            opacity: 0.8;
            z-index: 2;
        }
        .flower-pistil {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 15px;
            height: 15px;
            background: #d4aa00;
            clip-path: polygon(
                50% 0%,
                62% 25%,
                87% 30%,
                68% 50%,
                75% 75%,
                50% 65%,
                25% 75%,
                32% 50%,
                13% 30%,
                38% 25%
            );
            z-index: 3;
        }
        .flower1 {
            left: 0;
            top: 40px;
            transform: rotate(-8deg);
        }
        .flower1 .flower-petal {
            background: #ffd300;
        }
        .flower2 {
            left: 40px;
            top: 10px;
            transform: rotate(8deg);
        }
        .flower2 .flower-petal {
            background: #ffe666;
        }
        .flower2 .flower-highlight {
            background: #ffffb3;
        }
        .blue-bottle {
            position: absolute;
            bottom: 120px;
            left: 430px;
            width: 50px;
            height: 120px;
            z-index: 6;
            transform: translateX(-100%);
            filter: drop-shadow(2px 3px 2px rgba(0,0,0,0.2));
        }
        .b1 {
            position: absolute;
            inset: 0;
            background: #2563eb; 
            clip-path: polygon(
                45% 0%,
                55% 0%,
                75% 8%,
                90% 25%,
                100% 60%,
                90% 90%,
                70% 100%,
                30% 100%,
                10% 90%,
                0% 60%,
                10% 25%,
                25% 8%
            );
        }
        .b2 {
            position: absolute;
            inset: 8px 6px 12px 6px;
            background: #1d4ed8;
            clip-path: polygon(
                47% 0%, 
                53% 0%, 
                70% 10%, 
                85% 28%, 
                95% 60%, 
                85% 90%, 
                65% 100%, 
                35% 100%, 
                15% 90%, 
                5% 60%, 
                15% 28%, 
                30% 10%
            );
        }
        .b3 {
            position: absolute;
            inset: 12px 4px 20px 20px;
            background: #3b82f6;
            opacity: 0.7;
            clip-path: polygon(
                50% 0%, 
                80% 10%, 
                90% 30%, 
                80% 60%, 
                60% 80%, 
                40% 70%, 
                45% 30%
            );
            z-index: 7;
        }
        .b4 {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 8px;
            background: #1e40af;
            clip-path: polygon(
                20% 0%, 
                80% 0%, 
                100% 100%, 
                0% 100%
            );
            z-index: 7;
        }
    </style>
</head>
<body>

<div class="scene">
    <div class="whiteboard"></div>
    <div class="back-table"></div>
    <div class="chair-back">
        <div class="chair-back-main"></div>
        <div class="chair-back-inner"></div>
        <div class="chair-back-highlight"></div>
        <div class="chair-back-stripe1"></div>
        <div class="chair-back-stripe2"></div>
        <div class="chair-back-stripe3"></div>
    </div>
    <div class="front-table"></div>
        <div class="apple poly">
        <div class="apple-body"></div>
        <div class="apple-highlight"></div>
        <div class="apple-stem"></div>
    </div>
    <div class="pineapple">
        <div class="pineapple-body"></div>
        <div class="pineapple-scale1"></div>
        <div class="pineapple-scale2"></div>
        <div class="pineapple-scale3"></div>
        <div class="pineapple-leaves">
            <div class="leaf1"></div>
            <div class="leaf2"></div>
            <div class="leaf3"></div>
            <div class="leaf4"></div>
            <div class="leaf5"></div>
        </div>
    </div>
    <div class="vase">
        <div class="v1"></div>
        <div class="v2"></div>
    </div>
    <div class="flowers">
        <div class="flower flower1">
            <div class="flower-petal"></div>
            <div class="flower-highlight"></div>
            <div class="flower-pistil"></div>
        </div>
        <div class="flower flower2">
            <div class="flower-petal"></div>
            <div class="flower-highlight"></div>
            <div class="flower-pistil"></div>
        </div>
    </div>
    <div class="blue-bottle">
        <div class="b1"></div>
        <div class="b2"></div>
        <div class="b3"></div>
        <div class="b4"></div>
    </div>
</div>

</body>
</html>
